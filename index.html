<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Borno Language Editor</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/fontawesome.min.css"
        integrity="sha512-v8QQ0YQ3H4K6Ic3PJkym91KoeNT5S3PnDKvqnwqFD1oiqIl653crGZplPdU5KKtHjO0QKcQ2aUlQZYjHczkmGw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
        integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- Load CodeMirror resources from CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/theme/dracula.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/addon/mode/simple.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <div class="editor-container">
            <div class="editor-header">
                <h1 class="editor-title">Borno Editor</h1>
                <div class="editor-controls">
                    <a class="docs-btn" href="./docs/index.html">
                        <i class="fas fa-book" aria-hidden="true"></i>Documentation
                    </a>
                    <button class="run-btn" id="run"> <i class="fas fa-play" aria-hidden="true"></i> Run </button>
                    <button class="clear-btn" id="clear"><i class="fas fa-trash" aria-hidden="true"></i> Clear</button>
                </div>
            </div>
            <textarea id="editor"></textarea>
            <div class="output-container">
                <h3 class="output-title">Output</h3>
                <div id="output"></div>
            </div>
        </div>
    </div>

    <script src="script.js">

    </script>
</body>

</html>
